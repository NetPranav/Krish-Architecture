<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Field-Ready Agri</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#00639a",
                        "inverse-primary": "#88d982",
                        "tertiary-fixed-dim": "#f8bd2a",
                        "on-tertiary-fixed": "#261a00",
                        "secondary-fixed": "#cee5ff",
                        "on-surface": "#1a1c1c",
                        "on-background": "#1a1c1c",
                        "surface-bright": "#f9f9f9",
                        "on-primary": "#ffffff",
                        "tertiary": "#6e5100",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f0f1f1",
                        "background": "#f9f9f9",
                        "on-primary-fixed": "#002204",
                        "on-secondary-container": "#00436a",
                        "tertiary-fixed": "#ffdfa0",
                        "on-secondary-fixed-variant": "#004a75",
                        "surface": "#f9f9f9",
                        "outline-variant": "#bfcaba",
                        "primary-fixed": "#a3f69c",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#ffefd7",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-container": "#cbffc2",
                        "on-error": "#ffffff",
                        "surface-container": "#eeeeee",
                        "primary-fixed-dim": "#88d982",
                        "surface-container-high": "#e8e8e8",
                        "primary-container": "#2e7d32",
                        "surface-container-low": "#f3f3f3",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "inverse-surface": "#2f3131",
                        "primary": "#0d631b",
                        "tertiary-container": "#8c6800",
                        "on-secondary-fixed": "#001d32",
                        "on-surface-variant": "#40493d",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#1b6d24",
                        "secondary-fixed-dim": "#96ccff",
                        "secondary-container": "#51b2fe",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#005312",
                        "outline": "#707a6c",
                        "surface-dim": "#dadada",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "unit": "8px",
                        "card-padding": "24px",
                        "container-margin": "24px",
                        "touch-target-min": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "hindi-body": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "hindi-body": ["18px", { "lineHeight": "30px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                }
            }
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-bright min-h-screen flex flex-col items-center justify-center p-4">
<!-- Decorative ambient background element -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-1/2 h-1/2 bg-primary-fixed/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-1/2 h-1/2 bg-secondary-fixed/20 rounded-full blur-[100px]"></div>
</div>
<!-- Login Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(46,125,50,0.08)] border border-outline-variant/30 p-card-padding sm:p-8 flex flex-col relative overflow-hidden">
<!-- Subtle Top Brand Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
<!-- Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-4 text-primary">
<span class="material-symbols-outlined" data-icon="eco" style="font-size: 32px;">eco</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2 text-center">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Sign in to access your farm dashboard.</p>
</div>
<!-- Form Elements -->
<form class="flex flex-col gap-6">
<!-- Phone / Email Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="contact">Phone Number / Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="person">person</span>
<input class="w-full min-h-[48px] pl-12 pr-4 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body-md text-body-md text-on-surface transition-colors placeholder:text-outline" id="contact" placeholder="Enter details" type="text"/>
</div>
<!-- Bilingual Helper -->
<p class="font-hindi-body text-hindi-body text-on-surface-variant text-sm mt-1">Enter mobile number / मोबाइल नंबर दर्ज करें</p>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="lock">lock</span>
<input class="w-full min-h-[48px] pl-12 pr-12 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body-md text-body-md text-on-surface transition-colors placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
<!-- Show Toggle -->
<button aria-label="Toggle password visibility" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 min-h-[48px] min-w-[48px] flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-1">
<a class="font-label-lg text-label-lg text-secondary hover:text-secondary-container transition-colors py-2" href="#">Forgot Password?</a>
</div>
</div>
<!-- Primary Login Button -->
<button class="w-full min-h-[48px] bg-primary text-on-primary rounded-lg font-label-lg text-label-lg flex items-center justify-center hover:bg-surface-tint active:scale-[0.98] transition-all shadow-md shadow-primary/20 mt-2" type="submit">
                Login
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-6">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-body-md text-body-md text-on-surface-variant text-sm uppercase tracking-wider">Or</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<!-- Secondary Login Action -->
<button class="w-full min-h-[48px] bg-surface-container-lowest text-on-surface border border-outline-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center gap-2 hover:bg-surface-container transition-colors active:scale-[0.98]" type="button">
<span class="material-symbols-outlined" data-icon="sms">sms</span>
            Login with OTP
        </button>
</main>
<!-- Footer Note -->
<p class="mt-8 font-body-md text-body-md text-on-surface-variant text-sm text-center max-w-xs">
        By logging in, you agree to our <a class="text-secondary hover:underline" href="#">Terms of Service</a> and <a class="text-secondary hover:underline" href="#">Privacy Policy</a>.
    </p>
</body></html>
