<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#00639a",
                    "inverse-primary": "#88d982",
                    "tertiary-fixed-dim": "#f8bd2a",
                    "on-tertiary-fixed": "#261a00",
                    "secondary-fixed": "#cee5ff",
                    "on-surface": "#1a1c1c",
                    "on-background": "#1a1c1c",
                    "surface-bright": "#f9f9f9",
                    "on-primary": "#ffffff",
                    "tertiary": "#6e5100",
                    "error-container": "#ffdad6",
                    "inverse-on-surface": "#f0f1f1",
                    "background": "#f9f9f9",
                    "on-primary-fixed": "#002204",
                    "on-secondary-container": "#00436a",
                    "tertiary-fixed": "#ffdfa0",
                    "on-secondary-fixed-variant": "#004a75",
                    "surface": "#f9f9f9",
                    "outline-variant": "#bfcaba",
                    "primary-fixed": "#a3f69c",
                    "error": "#ba1a1a",
                    "on-tertiary-container": "#ffefd7",
                    "surface-container-highest": "#e2e2e2",
                    "on-primary-container": "#cbffc2",
                    "on-error": "#ffffff",
                    "surface-container": "#eeeeee",
                    "primary-fixed-dim": "#88d982",
                    "surface-container-high": "#e8e8e8",
                    "primary-container": "#2e7d32",
                    "surface-container-low": "#f3f3f3",
                    "on-tertiary-fixed-variant": "#5c4300",
                    "inverse-surface": "#2f3131",
                    "primary": "#0d631b",
                    "tertiary-container": "#8c6800",
                    "on-secondary-fixed": "#001d32",
                    "on-surface-variant": "#40493d",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e2e2e2",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#1b6d24",
                    "secondary-fixed-dim": "#96ccff",
                    "secondary-container": "#51b2fe",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#005312",
                    "outline": "#707a6c",
                    "surface-dim": "#dadada",
                    "surface-container-lowest": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "unit": "8px",
                    "card-padding": "24px",
                    "container-margin": "24px",
                    "touch-target-min": "48px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "label-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "hindi-body": ["Inter"],
                    "display-lg": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "hindi-body": ["18px", {"lineHeight": "30px", "fontWeight": "400"}],

                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}]

          }
        }
      }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-surface-container-lowest/90 backdrop-blur-[20px] border border-surface-container-highest shadow-[0_4px_20px_rgba(46,125,50,0.15)];
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen relative flex items-center justify-center p-4 antialiased overflow-x-hidden">
<!-- Ambient Background -->
<div class="fixed inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1592982537447-6f2334208f34?auto=format&amp;fit=crop&amp;q=80')] bg-cover bg-center" data-alt="blurred vast green agricultural field bathed in soft morning sunlight with a modern clean aesthetic">
<div class="absolute inset-0 bg-surface/80 backdrop-blur-sm"></div>
</div>
<!-- Main Registration Container -->
<main class="w-full max-w-md glass-panel rounded-xl p-card-padding z-10 flex flex-col relative">
<!-- Header -->
<header class="mb-6 text-center">
<div class="w-16 h-16 mx-auto bg-primary-container/20 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-3xl">psychiatry</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Step 1 of 3: Personal Details</p>
</header>
<!-- Progress Bar -->
<div aria-valuemax="100" aria-valuemin="0" aria-valuenow="33" class="w-full h-2 bg-surface-container rounded-full mb-8 overflow-hidden" role="progressbar">
<div class="h-full bg-primary rounded-full transition-all duration-500 ease-out" style="width: 33.33%;"></div>
</div>
<!-- Form Elements -->
<form class="flex flex-col gap-6">
<!-- Full Name Field -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="fullName">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline pointer-events-none">person</span>
<input class="w-full h-touch-target-min pl-12 pr-4 bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-outline-variant" id="fullName" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Phone Number Field -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="phoneNumber">Phone Number</label>
<div class="flex h-touch-target-min">
<div class="flex items-center justify-center px-4 bg-surface-container border border-r-0 border-outline rounded-l-lg font-body-md text-body-md text-on-surface-variant select-none">
                        +91
                    </div>
<input class="flex-1 w-full bg-surface-container-lowest border border-outline rounded-r-lg px-4 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-outline-variant" id="phoneNumber" placeholder="10-digit mobile number" type="tel"/>
</div>
</div>
<!-- Language Selection Dropdown -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="language">Preferred Language</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">translate</span>
<select class="w-full h-touch-target-min pl-12 pr-10 bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all appearance-none cursor-pointer" id="language">
<option value="en">English</option>
<option value="hi">Hindi (हिंदी)</option>
<option value="mr">Marathi (मराठी)</option>
<option value="gu">Gujarati (ગુજરાતી)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Farm Type Dropdown -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="farmType">Primary Operation</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">agriculture</span>
<select class="w-full h-touch-target-min pl-12 pr-10 bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all appearance-none cursor-pointer" id="farmType">
<option disabled="" selected="" value="">Select operation type</option>
<option value="grains">Grains &amp; Cereals</option>
<option value="fruits">Orchards &amp; Fruits</option>
<option value="vegetables">Vegetable Crops</option>
<option value="mixed">Mixed Farming</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- CTA Button -->
<div class="mt-4 pt-2 border-t border-surface-container">
<button class="w-full h-touch-target-min bg-primary hover:bg-surface-tint text-on-primary font-label-lg text-label-lg rounded-lg flex items-center justify-center gap-2 transition-colors active:scale-[0.98]" type="button">
                    Continue
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
<!-- Login Link -->
<p class="text-center font-body-md text-body-md text-on-surface-variant mt-2">
                Already have an account? <a class="text-primary font-semibold hover:underline" href="#">Sign In</a>
</p>
</form>
</main>
</body></html>
